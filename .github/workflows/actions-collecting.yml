name: upload and download dir
on: push
jobs:
  job1:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: create a dir with file
        run: |
          mkdir myfolder
          hostname >> myfolder/hostname.txt
          date >> myfolder/date.txt
          ls -la >> myfolder/listing.txt
      - name: upload dir
        uses: actions/upload-artifact@v4
        with:
          name: myfolder
          path: myfolder/
    job2:
      runs-on: ubuntu-22.04
      needs: job1
      steps:
        - name: download dir
          uses: actions/download-artifact@v4
          with:
            name: myfolder
            path: myfolder/
        - name: show download files
          run: | 
            echo "Contents of downloaded folder:"
            ls -la myfolder/
            echo "---- hostname.txt ----"
            cat myfolder/hostname.txt
            echo "---- date.txt ----"
            cat myfolder/date.txt
