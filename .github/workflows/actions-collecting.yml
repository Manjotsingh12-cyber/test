name: pass the arctifacts between 
on: push
jobs:
  job1:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4.4.0
      - name: command
        run: ls -ls 
      - name: create file
        run: hostname >> hostname.txt
      - name: upload artivasts
        uses: actions/upload-artifact@v4
        with:
          name: hostname-artifact
          path: hostname.txt
  job2:
    runs-on: ubuntu-22.04
    needs: job1
    steps:
      - name: checkout download
        uses: actions/download-artifact@v4
        with:
          name: hostname-artifact
